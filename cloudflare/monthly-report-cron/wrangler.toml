name = "ads-dashboard-monthly-report-automation"
main = "src/index.ts"
compatibility_date = "2026-04-28"
compatibility_flags = ["nodejs_compat"]

# Cloudflare cron uses UTC. 04:00 UTC = 12:00 PM Malaysia time.
[triggers]
crons = ["0 4 7,10,15 * *"]

[browser]
binding = "REPORT_BROWSER"

[[durable_objects.bindings]]
name = "BROWSER_LAUNCH_LIMITER"
class_name = "BrowserLaunchLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BrowserLaunchLimiter"]

[vars]
REPORT_EMAIL_DELIVERY_MODE = "attachment"
BROWSER_LAUNCH_SPACING_MS = "7000"
REPORT_COMPLETION_NOTIFICATION_TO = "waiing@locus-t.com.my"
REPORT_COMPLETION_NOTIFICATION_CC = "eason@locus-t.com.my,ava@locus-t.com.my"

[[d1_databases]]
binding = "REPORT_JOBS_DB"
database_name = "automation-report-jobs"
database_id = "06953d60-3819-46e8-b846-9b0fcfa91643"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "REPORT_PDFS"
bucket_name = "automation-report-pdfs"

[[queues.producers]]
binding = "MONTHLY_REPORT_QUEUE"
queue = "monthly-report-queue"

[[queues.consumers]]
queue = "monthly-report-queue"
max_batch_size = 1
max_batch_timeout = 10
max_concurrency = 8
max_retries = 5
retry_delay = 60
dead_letter_queue = "monthly-report-dead-letter-queue"
